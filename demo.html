<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>SpecCom | Interactive Demo</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#050810;--blue:#378ADD;--teal:#1D9E75;--text:#fff;--muted:rgba(140,175,210,0.6);--dim:rgba(100,140,180,0.45);--brand:"Rajdhani",sans-serif;--ui:"Exo 2",sans-serif;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ui);-webkit-font-smoothing:antialiased;}
    #starfield{position:fixed;inset:0;z-index:0;}
    .fiber-bg{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.5;}
    .sp-strand{fill:none;stroke-linecap:round;}
    .sp-f1{stroke:rgba(55,138,221,.18);stroke-width:1.5;}
    .sp-f2{stroke:rgba(29,158,117,.14);stroke-width:1;}
    .sp-pulse{fill:none;stroke-linecap:round;stroke-dasharray:60 1000;stroke-dashoffset:1000;animation:spTravel 4s ease-in-out infinite;}
    .sp-p1{stroke:rgba(180,220,255,.85);stroke-width:2;}
    .sp-p2{stroke:rgba(100,220,180,.75);stroke-width:1.5;animation-delay:1.4s;}
    .sp-p3{stroke:rgba(200,230,255,.65);stroke-width:1.5;animation-delay:2.6s;}
    @keyframes spTravel{0%{stroke-dashoffset:1200;opacity:0}5%{opacity:1}85%{opacity:.8}100%{stroke-dashoffset:-200;opacity:0}}
    .glow-orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:1;}
    .go1{width:320px;height:320px;background:rgba(55,138,221,.1);top:-80px;left:-80px;animation:orbFloat 9s ease-in-out infinite;}
    .go2{width:260px;height:260px;background:rgba(29,158,117,.08);bottom:-60px;right:-60px;animation:orbFloat 11s ease-in-out infinite reverse;}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-15px) scale(1.08)}}
    .cb{position:fixed;width:22px;height:22px;opacity:.35;z-index:2;}
    .cb.tl{top:14px;left:14px;border-top:1px solid var(--blue);border-left:1px solid var(--blue);}
    .cb.tr{top:14px;right:14px;border-top:1px solid var(--blue);border-right:1px solid var(--blue);}
    .cb.bl{bottom:14px;left:14px;border-bottom:1px solid var(--blue);border-left:1px solid var(--blue);}
    .cb.br{bottom:14px;right:14px;border-bottom:1px solid var(--blue);border-right:1px solid var(--blue);}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
    @keyframes dropPin{0%{opacity:0;transform:translate(-50%,-130%) scale(.5)}65%{transform:translate(-50%,-93%) scale(1.12)}100%{opacity:1;transform:translate(-50%,-100%) scale(1)}}
    @keyframes ringPop{0%{transform:scale(1);opacity:.6}100%{transform:scale(3.5);opacity:0}}
    @keyframes warpLine{0%{transform:scaleX(0);opacity:0}10%{opacity:1}100%{transform:scaleX(28);opacity:0}}
    @keyframes btnPulse{0%,100%{box-shadow:0 0 0 0 rgba(55,138,221,.5)}70%{box-shadow:0 0 0 12px rgba(55,138,221,0)}}
    @keyframes checkCircle{to{stroke-dashoffset:0}}
    @keyframes checkPath{to{stroke-dashoffset:0}}
    #warp{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;}
    #warp.on{opacity:1;}
    .wl{position:absolute;height:1px;width:40px;transform-origin:center;transform:scaleX(0);}
    .wl.on{animation:warpLine .5s ease-out forwards;}
    .cbar{position:fixed;left:0;right:0;height:0;background:#000;z-index:9990;transition:height .65s cubic-bezier(.16,1,.3,1);}
    .cbar.top{top:0;}.cbar.bot{bottom:0;}.cbar.on{height:42px;}

    /* SPLASH */
    #splash{position:fixed;inset:0;z-index:8000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .7s;}
    #splash.out{opacity:0;pointer-events:none;}
    .spl-logo{height:72px;filter:drop-shadow(0 0 36px rgba(55,138,221,.7));animation:scaleIn .9s cubic-bezier(.16,1,.3,1) .2s both;}
    .spl-title{font-family:var(--brand);font-size:28px;font-weight:700;letter-spacing:5px;opacity:0;animation:slideUp .7s ease .7s forwards;}
    .spl-sub{font-size:11px;color:var(--muted);letter-spacing:2.5px;opacity:0;animation:fadeIn .6s ease 1.2s forwards;}
    .spl-btn{margin-top:10px;padding:13px 36px;border-radius:10px;background:var(--blue);border:none;color:#fff;font-family:var(--brand);font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;opacity:0;animation:slideUp .5s ease 1.6s forwards;transition:all .2s;box-shadow:0 0 26px rgba(55,138,221,.3);}
    .spl-btn:hover{background:#4a9de8;transform:translateY(-2px);box-shadow:0 0 46px rgba(55,138,221,.5);}
    .spl-tag{font-size:10px;color:var(--dim);letter-spacing:2px;opacity:0;animation:fadeIn .5s ease 2.1s forwards;}

    /* HUB */
    #hub{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .4s;}
    #hub.on{opacity:1;pointer-events:auto;}
    .hub-logo{height:36px;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(55,138,221,.4));}
    .hub-h{font-family:var(--brand);font-size:20px;font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:3px;}
    .hub-s{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-align:center;margin-bottom:22px;}
    .hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;width:100%;max-width:680px;}
    .hcard{background:rgba(13,22,42,.92);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:15px 13px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
    .hcard:hover{transform:translateY(-3px);}
    .hcard .hc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
    .hcard .hc-title{font-family:var(--brand);font-size:14px;font-weight:700;margin-bottom:4px;}
    .hcard .hc-sub{font-size:10px;color:var(--muted);line-height:1.5;}
    .hcard .hc-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;}
    .hcard .hc-chip{font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,.04);color:var(--dim);border:1px solid rgba(255,255,255,.05);}

    /* DEMO SHELL */
    #shell{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;}
    #shell.on{opacity:1;pointer-events:auto;}
    .frame{width:min(420px,96vw);height:min(790px,90vh);background:#060d1a;border:1px solid rgba(55,138,221,.16);border-radius:24px;box-shadow:0 0 90px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04);overflow:hidden;display:flex;flex-direction:column;}
    .ftopbar{height:50px;background:rgba(6,13,26,.98);border-bottom:1px solid rgba(55,138,221,.09);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
    .ftopbar img{height:23px;filter:drop-shadow(0 0 7px rgba(55,138,221,.35));}
    .ftopbar .flabel{flex:1;font-family:var(--brand);font-size:13px;font-weight:700;letter-spacing:1.5px;}
    .ftopbar .fback{background:none;border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:10px;padding:5px 11px;border-radius:6px;cursor:pointer;transition:all .18s;}
    .ftopbar .fback:hover{color:#fff;}
    .ftabs{display:flex;padding:8px 10px 0;gap:4px;background:rgba(6,13,26,.7);border-bottom:1px solid rgba(55,138,221,.05);flex-shrink:0;overflow-x:auto;}
    .ftabs::-webkit-scrollbar{display:none;}
    .ftab{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:6px 10px;border-radius:6px 6px 0 0;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
    .ftab.on{background:rgba(55,138,221,.1);color:var(--ws-a,var(--blue));border-bottom:2px solid var(--ws-a,var(--blue));}
    .fbody{flex:1;overflow-y:auto;overflow-x:hidden;}
    .fbody::-webkit-scrollbar{width:3px;}
    .fbody::-webkit-scrollbar-thumb{background:rgba(55,138,221,.2);border-radius:2px;}
    .scene{padding:14px;display:flex;flex-direction:column;gap:11px;animation:fadeIn .25s ease;}

    /* SCENE COMPONENTS */
    .stitle{font-family:var(--brand);font-size:15px;font-weight:700;letter-spacing:1px;color:rgba(200,225,255,.9);}
    .shint{font-size:10px;color:var(--dim);line-height:1.5;}
    .scard{background:rgba(10,20,44,.88);border:1px solid rgba(55,138,221,.09);border-radius:10px;padding:11px 13px;transition:all .2s;}
    .scard.click{cursor:pointer;}
    .scard.click:hover{border-color:rgba(55,138,221,.28);background:rgba(16,32,66,.85);}
    .scard.sel{border-color:var(--ws-a,var(--blue));background:rgba(55,138,221,.07);}
    .sct{font-size:13px;font-weight:600;margin-bottom:3px;}
    .scs{font-size:11px;color:var(--muted);}
    .sbadge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:700;letter-spacing:.4px;}
    .bg{background:rgba(29,158,117,.15);color:#4EC29A;}
    .ba{background:rgba(186,117,23,.15);color:#D39A44;}
    .bb{background:rgba(55,138,221,.15);color:#6CAEEB;}
    .br{background:rgba(216,90,48,.18);color:#EE835D;}
    .sbtn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 17px;border-radius:8px;border:none;font-family:var(--ui);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
    .sbtn.p{background:var(--ws-a,var(--blue));color:#fff;}
    .sbtn.p:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px);}
    .sbtn.p:disabled{opacity:.4;cursor:not-allowed;}
    .sbtn.g{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08);}
    .sbtn.g:hover{background:rgba(255,255,255,.09);color:#fff;}
    .sbtn.pulse{animation:btnPulse 1.6s ease-in-out infinite;}
    .sin{width:100%;background:rgba(5,11,24,.9);border:1px solid rgba(55,138,221,.15);border-radius:8px;padding:9px 11px;color:#fff;font-family:var(--ui);font-size:12px;outline:none;transition:border-color .18s;resize:none;}
    .sin:focus{border-color:var(--ws-a,var(--blue));}
    .ssel{width:100%;background:rgba(5,11,24,.95);border:1px solid rgba(55,138,221,.15);border-radius:8px;padding:9px 11px;color:#fff;font-family:var(--ui);font-size:12px;outline:none;appearance:none;cursor:pointer;}
    .slbl{font-size:10px;color:var(--muted);margin-bottom:3px;display:block;letter-spacing:.4px;}
    .srow{display:flex;gap:8px;align-items:center;}
    .scol{display:flex;flex-direction:column;gap:5px;}
    .sdiv{height:1px;background:rgba(55,138,221,.07);margin:2px 0;}
    .spb{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
    .spf{height:100%;border-radius:3px;transition:width 1.1s cubic-bezier(.16,1,.3,1);}
    .sok{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:22px 0;text-align:center;animation:fadeIn .35s ease;}
    .sclock{font-family:var(--brand);font-size:44px;font-weight:700;text-align:center;letter-spacing:4px;}
    .sclocksub{font-size:10px;color:var(--muted);text-align:center;letter-spacing:2px;}
    /* map */
    .smap{position:relative;border-radius:10px;overflow:hidden;background:#070f26;border:1px solid rgba(55,138,221,.09);}
    .smap-grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(rgba(55,138,221,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(55,138,221,.5) 1px,transparent 1px);background-size:26px 26px;}
    .sroad{position:absolute;background:rgba(55,138,221,.1);border-radius:1px;}
    .smaphint{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--dim);white-space:nowrap;background:rgba(5,8,16,.75);padding:2px 8px;border-radius:4px;pointer-events:none;}
    .spin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;animation:dropPin .4s cubic-bezier(.16,1,.3,1) both;}
    .spin-ring{position:absolute;width:22px;height:22px;border-radius:50%;border:2px solid var(--pc,var(--blue));bottom:-2px;left:50%;transform:translateX(-50%);pointer-events:none;animation:ringPop 1.1s ease-out both;}
    .spin-lbl{position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:rgba(5,11,24,.95);border:1px solid rgba(55,138,221,.2);border-radius:4px;font-size:9px;padding:2px 6px;white-space:nowrap;color:rgba(180,210,240,.9);pointer-events:none;}
    .spin-shad{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:8px;height:3px;background:rgba(0,0,0,.45);border-radius:50%;filter:blur(2px);}
    /* photo */
    .spz{border:2px dashed rgba(55,138,221,.18);border-radius:10px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .22s;text-align:center;}
    .spz:hover{border-color:var(--ws-a,var(--blue));background:rgba(55,138,221,.04);}
    .spgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
    .spthumb{border-radius:8px;overflow:hidden;aspect-ratio:1;background:rgba(10,20,44,.9);border:1px solid rgba(55,138,221,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:scaleIn .28s ease both;}
    /* table */
    .stbl{width:100%;border-collapse:collapse;font-size:11px;}
    .stbl th{text-align:left;padding:5px 8px;font-size:9px;font-weight:600;color:var(--dim);letter-spacing:1px;border-bottom:1px solid rgba(55,138,221,.09);}
    .stbl td{padding:7px 8px;border-bottom:1px solid rgba(55,138,221,.04);}
    .stbl tbody tr:hover td{background:rgba(55,138,221,.04);}
    .stot{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:rgba(55,138,221,.06);border-radius:8px;border:1px solid rgba(55,138,221,.1);}
    /* checkmark */
    .ckc{stroke-dasharray:176;stroke-dashoffset:176;transition:stroke-dashoffset 1s ease;}
    .ckp{stroke-dasharray:50;stroke-dashoffset:50;transition:stroke-dashoffset .5s ease .75s;}
    .ckc.on{stroke-dashoffset:0;}.ckp.on{stroke-dashoffset:0;}
    /* toast */
    #toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:rgba(14,28,58,.97);border:1px solid rgba(55,138,221,.25);color:#fff;padding:9px 18px;border-radius:9px;font-size:12px;font-weight:500;z-index:9998;opacity:0;transition:opacity .22s;white-space:nowrap;pointer-events:none;max-width:88vw;text-align:center;}
    #toast.on{opacity:1;}
    /* status */
    .dstatus{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;z-index:9990;}
    .dsdot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 2s ease-in-out infinite;}
    .dstxt{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(100,180,140,.4);}
    @media(max-width:480px){.hub-grid{grid-template-columns:repeat(2,1fr);}.frame{border-radius:0;width:100vw;height:100dvh;}}
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<svg class="fiber-bg" viewBox="0 0 800 540" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <path class="sp-strand sp-f1" d="M-20,80 C100,120 200,60 340,140 S560,200 820,100"/>
  <path class="sp-strand sp-f2" d="M-20,300 C120,260 280,320 440,280 S660,340 820,300"/>
  <path class="sp-strand sp-f1" d="M-20,450 C100,410 240,460 400,420 S620,470 820,440"/>
  <path class="sp-pulse sp-p1" d="M-20,80 C100,120 200,60 340,140 S560,200 820,100"/>
  <path class="sp-pulse sp-p2" d="M-20,300 C120,260 280,320 440,280 S660,340 820,300"/>
  <path class="sp-pulse sp-p3" d="M-20,450 C100,410 240,460 400,420 S620,470 820,440"/>
</svg>
<div class="glow-orb go1"></div><div class="glow-orb go2"></div>
<div class="cb tl"></div><div class="cb tr"></div><div class="cb bl"></div><div class="cb br"></div>
<div class="cbar top" id="cTop"></div><div class="cbar bot" id="cBot"></div>
<div id="warp"></div>

<div id="splash">
  <img src="assets/speccom_logo_2.png" alt="SpecCom" class="spl-logo"/>
  <div class="spl-title">SPECCOM DEMO</div>
  <div class="spl-sub">FIELD · DISPATCH · DOCUMENTATION · BILLING</div>
  <button class="spl-btn" id="splashBtn">Explore Interactive Demo →</button>
  <div class="spl-tag">No login required · No data saved · 100% interactive</div>
</div>

<div id="hub">
  <img src="assets/speccom_logo_2.png" alt="SpecCom" class="hub-logo"/>
  <div class="hub-h">Pick a Workspace</div>
  <div class="hub-s">Click around, fill things in — it's the real experience</div>
  <div class="hub-grid" id="hubGrid"></div>
</div>

<div id="shell">
  <div class="frame" id="frame">
    <div class="ftopbar">
      <img src="assets/speccom_logo_2.png" alt="SpecCom"/>
      <div class="flabel" id="wsLabel">—</div>
      <button class="fback" id="backBtn">← Back</button>
    </div>
    <div class="ftabs" id="tabsEl"></div>
    <div class="fbody" id="bodyEl"></div>
  </div>
</div>

<div id="toast"></div>
<div class="dstatus"><div class="dsdot"></div><span class="dstxt">Demo Mode — No data is saved</span></div>

<script>
!function(){
"use strict";
var $=function(id){return document.getElementById(id);};
var wait=function(ms){return new Promise(function(r){setTimeout(r,ms);});};
var toastTimer;
function toast(msg,dur){
  dur=dur||2500;
  var t=$("toast");t.textContent=msg;t.classList.add("on");
  clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove("on");},dur);
}

/* ── STARFIELD ── */
var cvs=$("starfield"),ctx=cvs.getContext("2d"),stars=[],warp=0,tw=0;
function initS(){cvs.width=innerWidth;cvs.height=innerHeight;stars=[];for(var i=0;i<280;i++)stars.push({x:Math.random()*cvs.width-cvs.width/2,y:Math.random()*cvs.height-cvs.height/2,z:Math.random()*1000});}
function drawS(){
  ctx.fillStyle="rgba(5,8,16,0.3)";ctx.fillRect(0,0,cvs.width,cvs.height);
  var cx=cvs.width/2,cy=cvs.height/2;
  for(var i=0;i<stars.length;i++){var s=stars[i];s.z-=1+warp*26;if(s.z<=0){s.z=1000;s.x=Math.random()*cvs.width-cx;s.y=Math.random()*cvs.height-cy;}
    var sx=(s.x/s.z)*300+cx,sy=(s.y/s.z)*300+cy,r=Math.max(.3,(1-s.z/1000)*(1.4+warp*2)),b=Math.min(1,(1-s.z/1000)*1.5);
    ctx.fillStyle="rgba(180,210,255,"+b+")";ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}
  warp+=(tw-warp)*.05;requestAnimationFrame(drawS);
}
addEventListener("resize",function(){cvs.width=innerWidth;cvs.height=innerHeight;});
initS();drawS();

function fireWarp(dur){
  return new Promise(function(res){
    tw=1;var ov=$("warp");ov.innerHTML="";ov.classList.add("on");
    var cx=innerWidth/2,cy=innerHeight/2;
    for(var i=0;i<44;i++){
      var l=document.createElement("div");l.className="wl";
      var a=(i/44)*360,d=30+Math.random()*65,len=16+Math.random()*32,rad=a*Math.PI/180;
      l.style.cssText="left:"+(cx+Math.cos(rad)*d)+"px;top:"+(cy+Math.sin(rad)*d)+"px;width:"+len+"px;background:linear-gradient(90deg,transparent,rgba(140,200,255,.5),transparent);transform-origin:left center;transform:rotate("+a+"deg) scaleX(0);";
      ov.appendChild(l);(function(el){setTimeout(function(){el.classList.add("on");},15+Math.random()*50);})(l);
    }
    setTimeout(function(){tw=0;ov.classList.remove("on");ov.innerHTML="";res();},dur||460);
  });
}

/* ── WORKSPACES ── */
var WS=[
  {key:"technician",title:"Technician",a:"#378ADD",g:"rgba(55,138,221,.14)",ib:"rgba(55,138,221,.14)",sub:"Clock in, accept work orders, capture field photos",chips:["Clock In","Work Orders","Photos","Complete"],
   icon:'<svg viewBox="0 0 18 18" fill="none" stroke="#6CAEEB" stroke-width="1.5"><circle cx="9" cy="9" r="6"/><path d="M9 5.5v3.5l2 2"/></svg>'},
  {key:"fieldmap",title:"Field Map",a:"#1D9E75",g:"rgba(29,158,117,.14)",ib:"rgba(29,158,117,.14)",sub:"Drop pins, name locations, capture GPS coordinates",chips:["Drop Pin","Name It","GPS Fix","Save"],

/* ── BUILD HUB ── */
function buildHub(){
  var g=$("hubGrid");g.innerHTML="";
  WS.forEach(function(ws){
    var c=document.createElement("div");
    c.className="hcard";
    c.style.borderColor="rgba(255,255,255,.07)";
    c.onmouseenter=function(){c.style.borderColor=ws.a;c.style.boxShadow="0 8px 30px "+ws.g;};
    c.onmouseleave=function(){c.style.borderColor="rgba(255,255,255,.07)";c.style.boxShadow="";};
    var chips=ws.chips.map(function(ch){return '<span class="hc-chip">'+ch+'</span>';}).join("");
    c.innerHTML='<div class="hc-icon" style="background:'+ws.ib+';">'+ws.icon+'</div>'
      +'<div class="hc-title">'+ws.title+'</div>'
      +'<div class="hc-sub">'+ws.sub+'</div>'
      +'<div class="hc-chips">'+chips+'</div>';
    c.addEventListener("click",function(){openWS(ws);});
    g.appendChild(c);
  });
}

/* ── SPLASH ── */
$("splashBtn").addEventListener("click",function(){
  $("splash").classList.add("out");
  setTimeout(function(){
    fireWarp(360).then(function(){
      buildHub();
      $("hub").classList.add("on");
    });
  },350);
});

/* ── OPEN WORKSPACE ── */
function openWS(ws){
  $("cTop").classList.add("on");$("cBot").classList.add("on");
  $("hub").classList.remove("on");
  fireWarp(380).then(function(){
    $("cTop").classList.remove("on");$("cBot").classList.remove("on");
    $("shell").style.setProperty("--ws-a",ws.a);
    $("wsLabel").textContent=ws.title;
    $("wsLabel").style.color=ws.a;
    $("frame").style.boxShadow="0 0 80px "+ws.g+",0 0 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04)";
    loadWS(ws);
    $("shell").classList.add("on");
  });
}

$("backBtn").addEventListener("click",function(){
  $("cTop").classList.add("on");$("cBot").classList.add("on");
  $("shell").classList.remove("on");
  fireWarp(360).then(function(){
    $("cTop").classList.remove("on");$("cBot").classList.remove("on");
    $("tabsEl").innerHTML="";$("bodyEl").innerHTML="";
    $("hub").classList.add("on");
  });
});

/* ── LOAD WORKSPACE ── */
function loadWS(ws){
  var scenes=getScenes(ws);
  var tabs=$("tabsEl"),body=$("bodyEl");
  tabs.innerHTML="";body.innerHTML="";
  scenes.forEach(function(sc,i){
    var t=document.createElement("button");
    t.className="ftab"+(i===0?" on":"");
    t.textContent=sc.label;
    t.addEventListener("click",function(){
      tabs.querySelectorAll(".ftab").forEach(function(b){b.classList.remove("on");});
      t.classList.add("on");
      showScene(sc,body);
    });
    tabs.appendChild(t);
  });
  showScene(scenes[0],body);
}

function showScene(sc,body){
  body.innerHTML="";
  var d=document.createElement("div");
  d.className="scene";
  sc.build(d);
  body.appendChild(d);
  body.scrollTop=0;
}

/* ── MAP HELPER ── */
function mkMap(h,accent,pins,onDrop){
  var m=document.createElement("div");
  m.className="smap";m.style.height=h+"px";
  m.innerHTML='<div class="smap-grid"></div>'
    +'<div class="sroad" style="top:30%;left:0;right:0;height:3px;opacity:.35;"></div>'
    +'<div class="sroad" style="top:58%;left:0;right:0;height:2px;opacity:.22;"></div>'
    +'<div class="sroad" style="top:0;bottom:0;left:38%;width:2px;opacity:.22;"></div>'
    +'<div class="sroad" style="top:0;bottom:0;left:70%;width:2px;opacity:.16;"></div>'
    +'<div class="smaphint">'+(onDrop?"Tap anywhere to drop a pin":"Tap a pin to view details")+'</div>';
  (pins||[]).forEach(function(p){m.appendChild(mkPin(p.x,p.y,accent,p.label));});
  if(onDrop){
    m.style.cursor="crosshair";
    m.addEventListener("click",function(e){
      if(e.target.closest(".spin"))return;
      var r=m.getBoundingClientRect();
      var x=((e.clientX-r.left)/r.width*100).toFixed(1);
      var y=((e.clientY-r.top)/r.height*100).toFixed(1);
      onDrop(parseFloat(x),parseFloat(y),m);
    });
  }
  return m;
}
function mkPin(x,y,accent,label){
  var p=document.createElement("div");
  p.className="spin";
  p.style.left=x;p.style.top=y;p.style.setProperty("--pc",accent);
  p.innerHTML=(label?'<div class="spin-lbl">'+label+'</div>':'')
    +'<svg width="18" height="26" viewBox="0 0 20 28"><path d="M10 0C4.48 0 0 4.48 0 10c0 7.5 10 18 10 18S20 17.5 20 10C20 4.48 15.52 0 10 0z" fill="'+accent+'"/><circle cx="10" cy="10" r="3.5" fill="rgba(255,255,255,.3)"/></svg>'
    +'<div class="spin-ring"></div><div class="spin-shad"></div>';
  return p;
}
function drawCheck(c){
  var cc=c.querySelector(".ckc"),cp=c.querySelector(".ckp");
  if(cc)requestAnimationFrame(function(){cc.classList.add("on");});
  if(cp)setTimeout(function(){cp.classList.add("on");},750);
}
