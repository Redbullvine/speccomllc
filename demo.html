<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>SpecCom | Interactive Demo</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#050810;--card-bg:rgba(13,22,42,0.92);--card-border:rgba(55,138,221,0.12);--blue:#378ADD;--teal:#1D9E75;--text:#fff;--muted:rgba(140,175,210,0.6);--dim:rgba(100,140,180,0.45);--brand:"Rajdhani",sans-serif;--ui:"Exo 2",sans-serif;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ui);-webkit-font-smoothing:antialiased;}
    #starfield{position:fixed;inset:0;z-index:0;}
    .fiber-bg{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.55;}
    .sp-strand{fill:none;stroke-linecap:round;}
    .sp-f1{stroke:rgba(55,138,221,.18);stroke-width:1.5;}
    .sp-f2{stroke:rgba(29,158,117,.14);stroke-width:1;}
    .sp-pulse{fill:none;stroke-linecap:round;stroke-dasharray:60 1000;stroke-dashoffset:1000;animation:spTravel 4s ease-in-out infinite;}
    .sp-p1{stroke:rgba(180,220,255,.85);stroke-width:2;}
    .sp-p2{stroke:rgba(100,220,180,.75);stroke-width:1.5;animation-delay:1.4s;}
    .sp-p3{stroke:rgba(200,230,255,.65);stroke-width:1.5;animation-delay:2.6s;}
    @keyframes spTravel{0%{stroke-dashoffset:1200;opacity:0}5%{opacity:1}85%{opacity:.8}100%{stroke-dashoffset:-200;opacity:0}}
    .glow-orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:1;}
    .go1{width:320px;height:320px;background:rgba(55,138,221,.1);top:-80px;left:-80px;animation:orbFloat 9s ease-in-out infinite;}
    .go2{width:260px;height:260px;background:rgba(29,158,117,.08);bottom:-60px;right:-60px;animation:orbFloat 11s ease-in-out infinite reverse;}
    .go3{width:200px;height:200px;background:rgba(127,119,221,.07);top:40%;left:60%;animation:orbFloat 13s ease-in-out 2s infinite;}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);opacity:.6}33%{transform:translate(30px,-20px) scale(1.15);opacity:.9}66%{transform:translate(-20px,15px) scale(.95);opacity:.7}}
    .cb{position:fixed;width:22px;height:22px;opacity:.35;z-index:2;}
    .cb.tl{top:14px;left:14px;border-top:1px solid var(--blue);border-left:1px solid var(--blue);}
    .cb.tr{top:14px;right:14px;border-top:1px solid var(--blue);border-right:1px solid var(--blue);}
    .cb.bl{bottom:14px;left:14px;border-bottom:1px solid var(--blue);border-left:1px solid var(--blue);}
    .cb.br{bottom:14px;right:14px;border-bottom:1px solid var(--blue);border-right:1px solid var(--blue);}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
    @keyframes dropPin{0%{opacity:0;transform:translate(-50%,-120%) scale(.6)}60%{transform:translate(-50%,-95%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-100%) scale(1)}}
    @keyframes ringPulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(3.5);opacity:0}}
    @keyframes warpLine{0%{transform:scaleX(0);opacity:0}10%{opacity:1}100%{transform:scaleX(30);opacity:0}}
    @keyframes pulsate{0%,100%{box-shadow:0 0 0 0 rgba(55,138,221,.5)}70%{box-shadow:0 0 0 14px rgba(55,138,221,0)}}
    #warp-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;}
    #warp-overlay.fire{opacity:1;}
    .warp-line{position:absolute;height:1px;width:40px;transform-origin:center;transform:scaleX(0);}
    .warp-line.fire{animation:warpLine .55s ease-out forwards;}
    .cine-bar{position:fixed;left:0;right:0;height:0;background:#000;z-index:9990;transition:height .7s cubic-bezier(.16,1,.3,1);}
    .cine-bar.top{top:0;}.cine-bar.bottom{bottom:0;}.cine-bar.active{height:44px;}
    /* SPLASH */
    #splash{position:fixed;inset:0;z-index:8000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .8s ease;}
    #splash.out{opacity:0;pointer-events:none;}
    .splash-logo{height:76px;filter:drop-shadow(0 0 40px rgba(55,138,221,.7));animation:scaleIn 1s cubic-bezier(.16,1,.3,1) .2s both;}
    .splash-title{font-family:var(--brand);font-size:30px;font-weight:700;letter-spacing:5px;text-align:center;opacity:0;animation:slideUp .8s ease .7s forwards;}
    .splash-sub{font-size:12px;color:var(--muted);letter-spacing:2.5px;text-align:center;opacity:0;animation:fadeIn .6s ease 1.3s forwards;}
    .splash-enter{margin-top:12px;padding:13px 38px;border-radius:10px;background:var(--blue);border:none;color:#fff;font-family:var(--brand);font-size:16px;font-weight:700;letter-spacing:2px;cursor:pointer;opacity:0;animation:slideUp .6s ease 1.7s forwards;transition:all .2s;box-shadow:0 0 28px rgba(55,138,221,.35);}
    .splash-enter:hover{background:#4a9de8;box-shadow:0 0 50px rgba(55,138,221,.55);transform:translateY(-2px);}
    .splash-tagline{font-size:10px;color:var(--dim);letter-spacing:2px;text-align:center;opacity:0;animation:fadeIn .5s ease 2.2s forwards;}
    /* HUB */
    #hub{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;padding:18px 16px 50px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .45s;}
    #hub.active{opacity:1;pointer-events:auto;}
    .hub-logo{height:38px;margin-bottom:8px;filter:drop-shadow(0 0 14px rgba(55,138,221,.4));}
    .hub-title{font-family:var(--brand);font-size:20px;font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:3px;}
    .hub-sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-align:center;margin-bottom:24px;}
    .hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;width:100%;max-width:700px;}
    .hub-card{background:var(--card-bg);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 13px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;}
    .hub-card::before{content:"";position:absolute;inset:0;border-radius:14px;background:var(--hc-glow,rgba(55,138,221,.07));opacity:0;transition:opacity .3s;}
    .hub-card:hover{transform:translateY(-3px);border-color:var(--hc-accent,var(--blue));}
    .hub-card:hover::before{opacity:1;}
    .hub-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
    .hub-card-title{font-family:var(--brand);font-size:14px;font-weight:700;margin-bottom:4px;}
    .hub-card-sub{font-size:10px;color:var(--muted);line-height:1.5;}
    .hub-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;}
    .hub-chip{font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,.04);color:var(--dim);border:1px solid rgba(255,255,255,.05);}
    /* SHELL */
    #demo-shell{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
    #demo-shell.active{opacity:1;pointer-events:auto;}
    .ds-frame{width:min(430px,96vw);height:min(800px,90vh);background:#060d1a;border:1px solid rgba(55,138,221,.16);border-radius:26px;box-shadow:0 0 100px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .4s;}
    .ds-topbar{height:50px;background:rgba(6,13,26,.98);border-bottom:1px solid rgba(55,138,221,.09);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
    .ds-logo{height:24px;filter:drop-shadow(0 0 8px rgba(55,138,221,.35));}
    .ds-ws-label{flex:1;font-family:var(--brand);font-size:13px;font-weight:700;letter-spacing:1.5px;}
    .ds-back{background:none;border:1px solid rgba(255,255,255,.09);color:var(--muted);font-family:var(--ui);font-size:10px;padding:5px 11px;border-radius:6px;cursor:pointer;transition:all .2s;}
    .ds-back:hover{border-color:var(--ws-accent,var(--blue));color:#fff;}
    .ds-tabs{display:flex;padding:8px 10px 0;gap:4px;background:rgba(6,13,26,.7);border-bottom:1px solid rgba(55,138,221,.05);flex-shrink:0;overflow-x:auto;}
    .ds-tabs::-webkit-scrollbar{display:none;}
    .ds-tab{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:6px 11px;border-radius:6px 6px 0 0;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
    .ds-tab.active{background:rgba(55,138,221,.1);color:var(--ws-accent,var(--blue));border-bottom:2px solid var(--ws-accent,var(--blue));}
    .ds-body{flex:1;overflow-y:auto;overflow-x:hidden;}
    .ds-body::-webkit-scrollbar{width:3px;}
    .ds-body::-webkit-scrollbar-thumb{background:rgba(55,138,221,.2);border-radius:2px;}
    .scene{padding:14px;display:flex;flex-direction:column;gap:11px;animation:fadeIn .3s ease;}
    /* components */
    .sc-title{font-family:var(--brand);font-size:15px;font-weight:700;letter-spacing:1px;color:rgba(200,225,255,.9);}
    .sc-hint{font-size:10px;color:var(--dim);line-height:1.5;}
    .sc-card{background:rgba(12,22,46,.85);border:1px solid rgba(55,138,221,.09);border-radius:10px;padding:11px 13px;transition:all .22s;}
    .sc-card.click{cursor:pointer;}
    .sc-card.click:hover{border-color:rgba(55,138,221,.25);background:rgba(18,34,66,.8);}
    .sc-card.sel{border-color:var(--ws-accent,var(--blue));background:rgba(55,138,221,.07);}
    .sc-ct{font-size:13px;font-weight:600;margin-bottom:3px;}
    .sc-cs{font-size:11px;color:var(--muted);}
    .sc-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:700;letter-spacing:.5px;}
    .cg{background:rgba(29,158,117,.15);color:#4EC29A;}
    .ca{background:rgba(186,117,23,.15);color:#D39A44;}
    .cb2{background:rgba(55,138,221,.15);color:#6CAEEB;}
    .cr{background:rgba(216,90,48,.18);color:#EE835D;}
    .sc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;font-family:var(--ui);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;}
    .sc-btn.p{background:var(--ws-accent,var(--blue));color:#fff;}
    .sc-btn.p:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px);}
    .sc-btn.p:disabled{opacity:.4;cursor:default;}
    .sc-btn.g{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08);}
    .sc-btn.g:hover{background:rgba(255,255,255,.09);color:#fff;}
    .sc-btn:active{transform:scale(.97)!important;}
    .sc-btn.pulse{animation:pulsate 1.6s ease-in-out infinite;}
    .sc-in{width:100%;background:rgba(6,13,26,.85);border:1px solid rgba(55,138,221,.14);border-radius:8px;padding:9px 11px;color:#fff;font-family:var(--ui);font-size:12px;outline:none;transition:border-color .2s;resize:none;}
    .sc-in:focus{border-color:var(--ws-accent,var(--blue));}
    .sc-sel{width:100%;background:rgba(6,13,26,.92);border:1px solid rgba(55,138,221,.14);border-radius:8px;padding:9px 11px;color:#fff;font-family:var(--ui);font-size:12px;outline:none;appearance:none;cursor:pointer;}
    .sc-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;display:block;letter-spacing:.5px;}
    .sc-row{display:flex;gap:8px;align-items:center;}
    .sc-col{display:flex;flex-direction:column;gap:5px;}
    .sc-div{height:1px;background:rgba(55,138,221,.07);margin:2px 0;}
    .sc-pb{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
    .sc-pf{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.16,1,.3,1);}
    .sc-ok{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px 0;text-align:center;animation:fadeIn .4s ease;}
    .sc-clock{font-family:var(--brand);font-size:46px;font-weight:700;text-align:center;letter-spacing:4px;}
    .sc-clock-sub{font-size:10px;color:var(--muted);text-align:center;letter-spacing:2px;}
    /* map */
    .sc-map{position:relative;border-radius:10px;overflow:hidden;background:#08122a;border:1px solid rgba(55,138,221,.09);user-select:none;}
    .sc-map-grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(rgba(55,138,221,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(55,138,221,.5) 1px,transparent 1px);background-size:28px 28px;}
    .sc-road{position:absolute;background:rgba(55,138,221,.1);border-radius:1px;}
    .sc-map-hint{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--dim);letter-spacing:1px;white-space:nowrap;background:rgba(5,8,16,.75);padding:2px 8px;border-radius:4px;pointer-events:none;}
    .sc-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;animation:dropPin .45s cubic-bezier(.16,1,.3,1) both;}
    .sc-pin-ring{position:absolute;width:24px;height:24px;border-radius:50%;border:2px solid var(--pc,var(--blue));bottom:-2px;left:50%;transform:translateX(-50%);pointer-events:none;animation:ringPulse 1.2s ease-out both;}
    .sc-pin-lbl{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:rgba(6,13,26,.95);border:1px solid rgba(55,138,221,.18);border-radius:4px;font-size:9px;padding:2px 6px;white-space:nowrap;color:rgba(180,210,240,.9);pointer-events:none;}
    .sc-pin-shad{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:8px;height:3px;background:rgba(0,0,0,.4);border-radius:50%;filter:blur(2px);}
    /* photo */
    .sc-pz{border:2px dashed rgba(55,138,221,.18);border-radius:10px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .25s;text-align:center;}
    .sc-pz:hover{border-color:var(--ws-accent,var(--blue));background:rgba(55,138,221,.04);}
    .sc-pg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
    .sc-pt{border-radius:8px;overflow:hidden;aspect-ratio:1;background:rgba(12,22,46,.9);border:1px solid rgba(55,138,221,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:scaleIn .3s ease both;}
    /* table */
    .sc-tbl{width:100%;border-collapse:collapse;font-size:11px;}
    .sc-tbl th{text-align:left;padding:5px 8px;font-size:9px;font-weight:600;color:var(--dim);letter-spacing:1px;border-bottom:1px solid rgba(55,138,221,.09);}
    .sc-tbl td{padding:7px 8px;border-bottom:1px solid rgba(55,138,221,.04);}
    .sc-tbl tbody tr{animation:fadeIn .3s ease both;cursor:pointer;}
    .sc-tbl tbody tr:hover td{background:rgba(55,138,221,.04);}
    .sc-tot{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:rgba(55,138,221,.06);border-radius:8px;border:1px solid rgba(55,138,221,.1);}
    /* checkmark */
    .ck-circle{stroke-dasharray:176;stroke-dashoffset:176;transition:stroke-dashoffset 1s ease;}
    .ck-path{stroke-dasharray:50;stroke-dashoffset:50;transition:stroke-dashoffset .5s ease .7s;}
    .ck-circle.on{stroke-dashoffset:0;}.ck-path.on{stroke-dashoffset:0;}
    /* toast */
    #toast{position:fixed;bottom:38px;left:50%;transform:translateX(-50%);background:rgba(18,34,66,.97);border:1px solid rgba(55,138,221,.25);color:#fff;padding:9px 20px;border-radius:9px;font-size:12px;font-weight:500;z-index:9998;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center;}
    #toast.on{opacity:1;}
    /* status */
    .ds{position:fixed;bottom:7px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;z-index:9991;}
    .ds-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 2s ease-in-out infinite;}
    .ds-txt{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(100,180,140,.4);}
    @media(max-width:480px){.hub-grid{grid-template-columns:repeat(2,1fr);}.ds-frame{border-radius:0;width:100vw;height:100dvh;}}
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<svg class="fiber-bg" viewBox="0 0 800 540" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <path class="sp-strand sp-f1" d="M-20,80 C100,120 200,60 340,140 S560,200 820,100"/>
  <path class="sp-strand sp-f2" d="M-20,300 C120,260 280,320 440,280 S660,340 820,300"/>
  <path class="sp-strand sp-f1" d="M-20,450 C100,410 240,460 400,420 S620,470 820,440"/>
  <path class="sp-pulse sp-p1" d="M-20,80 C100,120 200,60 340,140 S560,200 820,100"/>
  <path class="sp-pulse sp-p2" d="M-20,300 C120,260 280,320 440,280 S660,340 820,300"/>
  <path class="sp-pulse sp-p3" d="M-20,450 C100,410 240,460 400,420 S620,470 820,440"/>
</svg>
<div class="glow-orb go1"></div><div class="glow-orb go2"></div><div class="glow-orb go3"></div>
<div class="cb tl"></div><div class="cb tr"></div><div class="cb bl"></div><div class="cb br"></div>
<div class="cine-bar top" id="cineTop"></div><div class="cine-bar bottom" id="cineBottom"></div>
<div id="warp-overlay"></div>

<div id="splash">
  <img src="assets/speccom_logo_2.png" alt="SpecCom" class="splash-logo"/>
  <div class="splash-title">SPECCOM DEMO</div>
  <div class="splash-sub">FIELD · DISPATCH · DOCUMENTATION · BILLING</div>
  <button class="splash-enter" id="splashEnter">Explore Interactive Demo →</button>
  <div class="splash-tagline">No login required · No data saved · 100% interactive</div>
</div>

<div id="hub">
  <img src="assets/speccom_logo_2.png" alt="SpecCom" class="hub-logo"/>
  <div class="hub-title">Pick a Workspace</div>
  <div class="hub-sub">Click around, fill things in — it's the real experience</div>
  <div class="hub-grid" id="hubGrid"></div>
</div>

<div id="demo-shell">
  <div class="ds-frame" id="dsFrame">
    <div class="ds-topbar">
      <img src="assets/speccom_logo_2.png" alt="SpecCom" class="ds-logo"/>
      <div class="ds-ws-label" id="dsLabel">—</div>
      <button class="ds-back" id="dsBack">← Back</button>
    </div>
    <div class="ds-tabs" id="dsTabs"></div>
    <div class="ds-body" id="dsBody"></div>
  </div>
</div>

<div id="toast"></div>
<div class="ds"><div class="ds-dot"></div><span class="ds-txt">Demo Mode — No data is saved</span></div>

<script src="demo-scenes.js"></script>
</body>
</html>
